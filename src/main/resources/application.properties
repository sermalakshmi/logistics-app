# ===========================
# LOGISTICS BOOKING SYSTEM
# application.properties
# ===========================

# Server
server.port=8080

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
app.jwt.secret=MySecretKeyForLogisticsAppThatIsAtLeast256BitsLongForSecurity123456
app.jwt.expiration=86400000

# ---- CORS ----
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500

# ---- Logging ----
logging.level.com.transport=DEBUG
logging.level.org.springframework.security=WARN